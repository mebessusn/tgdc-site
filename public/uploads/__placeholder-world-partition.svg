<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="Animated World Partition streaming tiles placeholder">
  <defs>
    <style>
      .bg { fill: #04060a; }
      .grid { stroke: #0c3b22; stroke-width: 1; }
      .scan { fill: #2fe07a; opacity: .06; animation: scan 3.2s linear infinite; }
      .label { fill: #7bffb0; font-family: 'Ubuntu Mono', monospace; font-size: 18px; }
      .dim { fill: #2fe07a; opacity: .6; }
      .tile { fill: #0c3b22; stroke: #2fe07a; stroke-width: 1.5;
              transform-box: fill-box; transform-origin: center;
              animation: stream 3.4s ease-in-out infinite; }
      @keyframes stream {
        0%   { opacity: 0; transform: translateY(8px) scale(.85); fill: #0c3b22; }
        18%  { opacity: 1; transform: none; fill: #1f7a45; }
        70%  { opacity: 1; fill: #1f7a45; }
        100% { opacity: .12; transform: scale(.96); fill: #0c3b22; }
      }
      @keyframes scan { 0% { transform: translateY(-40px); } 100% { transform: translateY(400px); } }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="640" height="400"/>
  <g class="grid">
    <line x1="0" y1="100" x2="640" y2="100"/><line x1="0" y1="200" x2="640" y2="200"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- streaming chunks (diagonal load wave) -->
  <g>
    <rect class="tile" x="150" y="86"  width="64" height="64" style="animation-delay:0s"/>
    <rect class="tile" x="230" y="86"  width="64" height="64" style="animation-delay:.18s"/>
    <rect class="tile" x="310" y="86"  width="64" height="64" style="animation-delay:.36s"/>
    <rect class="tile" x="390" y="86"  width="64" height="64" style="animation-delay:.54s"/>
    <rect class="tile" x="470" y="86"  width="64" height="64" style="animation-delay:.72s"/>
    <rect class="tile" x="150" y="166" width="64" height="64" style="animation-delay:.18s"/>
    <rect class="tile" x="230" y="166" width="64" height="64" style="animation-delay:.36s"/>
    <rect class="tile" x="310" y="166" width="64" height="64" style="animation-delay:.54s"/>
    <rect class="tile" x="390" y="166" width="64" height="64" style="animation-delay:.72s"/>
    <rect class="tile" x="470" y="166" width="64" height="64" style="animation-delay:.9s"/>
    <rect class="tile" x="150" y="246" width="64" height="64" style="animation-delay:.36s"/>
    <rect class="tile" x="230" y="246" width="64" height="64" style="animation-delay:.54s"/>
    <rect class="tile" x="310" y="246" width="64" height="64" style="animation-delay:.72s"/>
    <rect class="tile" x="390" y="246" width="64" height="64" style="animation-delay:.9s"/>
    <rect class="tile" x="470" y="246" width="64" height="64" style="animation-delay:1.08s"/>
  </g>

  <rect class="scan" x="0" y="0" width="640" height="40"/>
  <text class="label" x="24" y="368">WORLD PARTITION <tspan class="dim">// streamed open worlds</tspan></text>
</svg>
