<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="Animated Niagara particle VFX placeholder">
  <defs>
    <style>
      .bg { fill: #04060a; }
      .grid { stroke: #0c3b22; stroke-width: 1; }
      .scan { fill: #2fe07a; opacity: .06; animation: scan 3.2s linear infinite; }
      .label { fill: #7bffb0; font-family: 'Ubuntu Mono', monospace; font-size: 18px; }
      .dim { fill: #2fe07a; opacity: .6; }
      .emit { fill: none; stroke: #2fe07a; stroke-width: 1.5; opacity: .5; }
      .p { fill: #7bffb0; transform-box: fill-box; transform-origin: center;
           animation: rise 3s linear infinite; }
      @keyframes rise {
        0%   { transform: translateY(0) scale(1); opacity: 0; }
        12%  { opacity: 1; }
        80%  { opacity: .85; }
        100% { transform: translateY(-230px) scale(.4); opacity: 0; }
      }
      @keyframes scan { 0% { transform: translateY(-40px); } 100% { transform: translateY(400px); } }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="640" height="400"/>
  <g class="grid">
    <line x1="0" y1="100" x2="640" y2="100"/><line x1="0" y1="200" x2="640" y2="200"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- emitter -->
  <ellipse class="emit" cx="320" cy="320" rx="120" ry="16"/>

  <!-- rising embers -->
  <g>
    <circle class="p" cx="232" cy="316" r="4" style="animation-delay:0s"/>
    <circle class="p" cx="268" cy="316" r="3" style="animation-delay:.5s"/>
    <circle class="p" cx="296" cy="316" r="5" style="animation-delay:1.1s"/>
    <circle class="p" cx="320" cy="316" r="3" style="animation-delay:.2s"/>
    <circle class="p" cx="344" cy="316" r="4" style="animation-delay:1.6s"/>
    <circle class="p" cx="372" cy="316" r="3" style="animation-delay:.8s"/>
    <circle class="p" cx="404" cy="316" r="5" style="animation-delay:2.1s"/>
    <circle class="p" cx="248" cy="316" r="2" style="animation-delay:1.9s"/>
    <circle class="p" cx="312" cy="316" r="2" style="animation-delay:2.5s"/>
    <circle class="p" cx="356" cy="316" r="2" style="animation-delay:1.3s"/>
    <circle class="p" cx="388" cy="316" r="3" style="animation-delay:.35s"/>
    <circle class="p" cx="284" cy="316" r="4" style="animation-delay:2.8s"/>
    <circle class="p" cx="332" cy="316" r="3" style="animation-delay:.65s"/>
    <circle class="p" cx="420" cy="316" r="2" style="animation-delay:1.45s"/>
  </g>

  <rect class="scan" x="0" y="0" width="640" height="40"/>
  <text class="label" x="24" y="368">NIAGARA &amp; VFX <tspan class="dim">// gpu particle systems</tspan></text>
</svg>
